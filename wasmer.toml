[package]
name = "your-username/freevid"
version = "0.1.0"
description = "Freevid website with PHP backend and HTML frontend running on Wasmer Edge"

[[modules]]
name = "php"
source = "wasmer/php:8.2"

[[volumes]]
name = "web"
path = "."

[[apps]]
name = "freevid"

# 🟢 CRITICAL: Add this line to allow your PHP backend to talk to GitHub
allow-net = true

[[apps.routes]]
path = "/get_videos.php"
module = "php"

[[apps.routes]]
path = "/"
static = "."
