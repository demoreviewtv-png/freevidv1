    <script>
        /* 🛡️ ANTI-RELOAD SPAM PROTECTION SYSTEM */
        (function checkRateLimit() {
            const now = Date.now();
            const ONE_MINUTE = 60000;
            
            const lockExpires = localStorage.getItem('freevid_lock_time');
            if (lockExpires && now < parseInt(lockExpires)) {
                showRateLimitScreen();
                return;
            }

            let reloadHistory = JSON.parse(localStorage.getItem('freevid_reload_history') || '[]');
            reloadHistory = reloadHistory.filter(timestamp => (now - timestamp) < ONE_MINUTE);
            reloadHistory.push(now);
            localStorage.setItem('freevid_reload_history', JSON.stringify(reloadHistory));

            if (reloadHistory.length > 10) { // Slightly eased limit for active testing
                localStorage.setItem('freevid_lock_time', (now + ONE_MINUTE).toString());
                showRateLimitScreen();
            }
        })();

        function showRateLimitScreen() {
            document.body.innerHTML = `
                <div class="rate-limit-overlay">
                    <h2>Connection Blocked</h2>
                    <p>You have connected too many times in one minute, you have been suspended from connecting for one minute.</p>
                </div>
            `;
            window.stop(); 
            throw new Error("Execution suspended due to rapid reloads.");
        }

        const GITHUB_API_URL = "https://api.github.com/repos/demoreviewtv-png/FREEVID-Vidstorage/contents/videos";
        // 🚀 Fallback Route: Connects via global jsDelivr open-cache CDN if GitHub API rate blocks you
        const JSDELIVR_FALLBACK_URL = "https://cdn.jsdelivr.net/gh/demoreviewtv-png/FREEVID-Vidstorage@videos/videos/";
        
        const VIDEO_FOLDER = "https://raw.githubusercontent.com/demoreviewtv-png/FREEVID-Vidstorage/videos/videos/";
        const THUMBNAIL_FOLDER = "https://raw.githubusercontent.com/demoreviewtv-png/FREEVID-Vidstorage/videos/videos/thumbnails/";

        let serverVideos = [];
        let currentlyPlayingTitle = "";
        let currentlyPlayingCreator = "";
        let currentlyPlayingFilename = ""; 

        function formatDuration(seconds) {
            if (isNaN(seconds) || seconds === Infinity || seconds <= 0) return "";
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            return hrs > 0 ? `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}` : `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function getCleanName(filename) {
            return filename.replace(/\.[^/.]+$/, "").replace("[Downloadable]", "").replace("[AutoLoop]", "").replace(/\b\d{1,2}:\d{2}(?::\d{2})?\b/g, "").replace(/\[.*?\]/g, "").replace(/\s+/g, " ").trim();
        }

        function parseVideoMeta(filename) {
            const cleanName = getCleanName(filename);
            if (cleanName.includes(" - ")) {
                const parts = cleanName.split(" - ");
                return { title: parts[0].trim(), creator: parts[1].trim() };
            }
            return { title: cleanName, creator: "Unknown Creator" };
        }

        async function fetchVideoList() {
            const status = document.getElementById('status');
            const searchInput = document.getElementById('search');
            
            try {
                // Route 1: Try Primary GitHub API Connection
                status.textContent = "Syncing directly with GitHub storage...";
                const response = await fetch(GITHUB_API_URL);
                const items = await response.json();
                
                if (Array.isArray(items)) {
                    processSyncedVideos(items.filter(item => item.type === 'file').map(item => item.name));
                    return;
                }
                
                // If response isn't an array, we triggered a block or rate-limit response. Force catch fallback block:
                throw new Error("Invalid format from primary API");
                
            } catch (err) {
                // Route 2: Auto-connect to Fallback Storage Server
                status.textContent = "Primary connection busy. Switching to Fallback Storage...";
                try {
                    // Fetch directly from the repository index cached on jsDelivr
                    const fallbackResponse = await fetch("https://api.github.com/repos/demoreviewtv-png/FREEVID-Vidstorage/contents/videos");
                    // If that's blocked too, fallback to parsing via an alternate index request or reading cached arrays if available.
                    // For client stability, we'll try to read via raw scraper link or jsdelivr text map if yours existed. 
                    // To guarantee it NEVER displays "Invalid response format" even when both GitHub endpoints completely ban your IP:
                    const mockBackupList = []; 
                    
                    // Let's re-try a cleaner fallback array fetch
                    const altRes = await fetch("https://cdn.jsdelivr.net/gh/demoreviewtv-png/FREEVID-Vidstorage@videos/videos/");
                    if(altRes.ok) {
                        const htmlText = await altRes.text();
                        // Scrape file names directly from jsdelivr's directory view layout safely
                        const matches = htmlText.match(/href="([^"]+\.(mp4|webm|mkv|avi))"/gi);
                        if(matches) {
                            const scrapedFiles = matches.map(m => decodeURIComponent(m.replace('href="', '').replace('"', '')));
                            processSyncedVideos(scrapedFiles);
                            status.textContent = `Successfully synced via Fallback Cache! (${serverVideos.length} videos found)`;
                            return;
                        }
                    }
                    
                    status.textContent = "Server heavily loaded. Retrying automatically in 5 seconds...";
                    setTimeout(fetchVideoList, 5000);
                } catch(fallbackErr) {
                    status.textContent = "Connection timed out. Please try refreshing in a moment.";
                }
            }
        }

        function processSyncedVideos(videoArray) {
            const searchInput = document.getElementById('search');
            const status = document.getElementById('status');
            
            serverVideos = videoArray.filter(name => /\.(mp4|webm|mkv|avi)$/i.test(name));

            if (serverVideos.length > 0) {
                status.textContent = `Successfully synced! (${serverVideos.length} videos found)`;
                searchInput.disabled = false;
                showRandomVideos();
                renderLikedVideosGrid();
            } else {
                status.textContent = "Connected to storage, but no videos found inside /videos.";
            }
        }

        function selectVideo(video) {
            const meta = parseVideoMeta(video);
            const videoSrc = VIDEO_FOLDER + encodeURIComponent(video);
            const dlBtn = document.getElementById('downloadBtn');
            const loopBtn = document.getElementById('loopBtn');
            const likeBtn = document.getElementById('likeBtn');
            const resetBtn = document.getElementById('resetBtn');
            const volumeCtrl = document.getElementById('volumeControl');
            const player = document.getElementById('player');

            currentlyPlayingTitle = meta.title;
            currentlyPlayingCreator = meta.creator;
            currentlyPlayingFilename = video;

            player.src = videoSrc;
            document.getElementById('videoWrapper').style.display = "flex";
            document.getElementById('search').value = meta.title;
            document.getElementById('status').textContent = "Now playing: " + meta.title;
            
            player.loop = video.includes("[AutoLoop]");
            loopBtn.classList.toggle('active', player.loop);
            document.getElementById('loopText').textContent = player.loop ? "Looping: ON" : "Looping: OFF";
            loopBtn.style.display = "inline-flex";

            if (video.includes("[Downloadable]")) {
                dlBtn.href = videoSrc;
                dlBtn.setAttribute("download", video);
                dlBtn.style.display = "inline-flex";
            } else { dlBtn.style.display = "none"; }
            
            updateLikeButtonUI();
            likeBtn.style.display = "inline-flex";
            resetBtn.style.display = "inline-flex";
            volumeCtrl.style.display = "inline-flex"; 
            
            document.getElementById('volumeSlider').value = player.volume;

            if (meta.creator && meta.creator !== "Unknown Creator") { showCreatorGrid(meta.creator); } else { showRandomVideos(); }
        }

        document.getElementById('player').addEventListener('loadedmetadata', function() {
            const trueDuration = formatDuration(this.duration);
            if (trueDuration && currentlyPlayingTitle) {
                const fullDisplay = `[${trueDuration}] ${currentlyPlayingTitle}`;
                document.getElementById('search').value = fullDisplay;
                document.getElementById('status').textContent = "Now playing: " + fullDisplay;
            }
        });

        function toggleLoop() {
            const player = document.getElementById('player');
            if (player.src) {
                player.loop = !player.loop;
                document.getElementById('loopBtn').classList.toggle('active', player.loop);
                document.getElementById('loopText').textContent = player.loop ? "Looping: ON" : "Looping: OFF";
            }
        }

        function getLikedVideos() {
            return JSON.parse(localStorage.getItem('freevid_liked_videos') || '[]');
        }

        function toggleLike() {
            if (!currentlyPlayingFilename) return;
            let likedList = getLikedVideos();
            const index = likedList.indexOf(currentlyPlayingFilename);

            if (index > -1) {
                likedList.splice(index, 1); 
            } else {
                likedList.push(currentlyPlayingFilename); 
            }

            localStorage.setItem('freevid_liked_videos', JSON.stringify(likedList));
            updateLikeButtonUI();
            
            if (currentlyPlayingCreator && currentlyPlayingCreator !== "Unknown Creator") {
                showCreatorGrid(currentlyPlayingCreator);
            } else {
                showRandomVideos();
            }
            renderLikedVideosGrid();
        }

        function updateLikeButtonUI() {
            const likeBtn = document.getElementById('likeBtn');
            const likedList = getLikedVideos();
            const isLiked = likedList.includes(currentlyPlayingFilename);

            likeBtn.classList.toggle('liked', isLiked);
            likeBtn.querySelector('span').textContent = isLiked ? "Liked ❤️" : "Like Video 👍";
        }

        function changeVolume(val) {
            const player = document.getElementById('player');
            player.volume = val;
        }

        function handleRerollClick() {
            const player = document.getElementById('player');
            if (player.src && currentlyPlayingCreator && currentlyPlayingCreator !== "Unknown Creator") {
                showCreatorGrid(currentlyPlayingCreator);
            } else {
                showRandomVideos();
            }
        }

        function showRandomVideos() {
            document.getElementById('creatorHeader').textContent = "Discover Videos";
            const shuffled = [...serverVideos].sort(() => 0.5 - Math.random());
            buildGridCards(shuffled.slice(0, 9), "thumbnailGrid");
        }

        function showCreatorGrid(creatorName) {
            document.getElementById('creatorHeader').textContent = `More Videos From: ${creatorName}`;
            const matches = serverVideos.filter(video => parseVideoMeta(video).creator.toLowerCase() === creatorName.toLowerCase());
            buildGridCards(matches, "thumbnailGrid");
        }

        function renderLikedVideosGrid() {
            const likedList = getLikedVideos().filter(v => serverVideos.includes(v));
            const likedSection = document.getElementById('likedSection');
            if (likedList.length > 0) {
                likedSection.style.display = "block";
                buildGridCards(likedList, "likedThumbnailGrid");
            } else {
                likedSection.style.display = "none";
            }
        }

        function buildGridCards(videoList, targetGridId) {
            const grid = document.getElementById(targetGridId);
            const likedList = getLikedVideos();
            grid.innerHTML = ""; 

            videoList.forEach(video => {
                const meta = parseVideoMeta(video);
                const videoSrc = VIDEO_FOLDER + encodeURIComponent(video);
                const baseName = video.replace(/\.[^/.]+$/, "");
                const card = document.createElement('div');
                card.className = "video-card";
                card.onclick = () => { selectVideo(video); window.scrollTo({ top: 0, behavior: 'smooth' }); };

                if (likedList.includes(video) && targetGridId !== "likedThumbnailGrid") {
                    const badge = document.createElement('div');
                    badge.className = "card-like-badge";
                    badge.textContent = "❤️ Liked";
                    card.appendChild(badge);
                }

                const previewDiv = document.createElement('div');
                previewDiv.className = "thumb-preview";
                const thumbImage = document.createElement('img');
                thumbImage.src = `${THUMBNAIL_FOLDER}${encodeURIComponent(baseName)}.jpg`;
                thumbImage.onerror = function() {
                    if (this.src.endsWith('.jpg')) this.src = `${THUMBNAIL_FOLDER}${encodeURIComponent(baseName)}.png`;
                    else this.src = `${THUMBNAIL_FOLDER}DEFAULT-THUMBNAIL.png`;
                };
                previewDiv.appendChild(thumbImage);

                const hiddenMetaVideo = document.createElement('video');
                hiddenMetaVideo.src = videoSrc + "#t=0.1";
                hiddenMetaVideo.preload = "metadata";
                hiddenMetaVideo.muted = true;

                const detailsDiv = document.createElement('div');
                detailsDiv.className = "card-details";
                const titleDiv = document.createElement('div');
                titleDiv.className = "card-title";

                hiddenMetaVideo.addEventListener('loadedmetadata', function() {
                    const trueDuration = formatDuration(this.duration);
                    if (trueDuration) {
                        const dSpan = document.createElement('span');
                        dSpan.className = "title-duration";
                        dSpan.textContent = trueDuration;
                        titleDiv.insertBefore(dSpan, titleDiv.firstChild);
                    }
                });
                
                const tSpan = document.createElement('span'); tSpan.textContent = meta.title; titleDiv.appendChild(tSpan);
                const creatorDiv = document.createElement('div'); creatorDiv.className = "card-creator";
                creatorDiv.textContent = meta.creator;

                detailsDiv.appendChild(titleDiv); detailsDiv.appendChild(creatorDiv);
                card.appendChild(previewDiv); card.appendChild(detailsDiv); grid.appendChild(card);
            });
        }

        function filterVideos() {
            const query = document.getElementById('search').value.toLowerCase();
            const box = document.getElementById('results');
            box.innerHTML = "";
            if (!query) { box.style.display = "none"; return; }
            const matches = serverVideos.filter(video => getCleanName(video).toLowerCase().includes(query));
            if (matches.length > 0) {
                box.style.display = "block";
                matches.forEach(video => {
                    const meta = parseVideoMeta(video);
                    const div = document.createElement('div');
                    div.textContent = meta.creator !== "Unknown Creator" ? `${meta.title} (by ${meta.creator})` : meta.title;
                    div.onclick = () => { selectVideo(video); box.style.display = "none"; };
                    box.appendChild(div);
                });
            } else { box.style.display = "none"; }
        }

        function resetPlayer() {
            const player = document.getElementById('player');
            player.removeAttribute('src'); player.load(); 
            currentlyPlayingCreator = "";
            currentlyPlayingFilename = "";
            document.getElementById('videoWrapper').style.display = "none";
            document.getElementById('search').value = "";
            document.getElementById('status').textContent = `Successfully synced! (${serverVideos.length} videos found)`;
            document.getElementById('downloadBtn').style.display = "none";
            document.getElementById('loopBtn').style.display = "none";
            document.getElementById('likeBtn').style.display = "none";
            document.getElementById('resetBtn').style.display = "none";
            document.getElementById('volumeControl').style.display = "none"; 
            showRandomVideos(); 
            renderLikedVideosGrid();
        }

        function openAboutModal() { document.getElementById('aboutModal').classList.add('open'); }
        function closeAboutModal(e) { if (e.target.id === 'aboutModal') document.getElementById('aboutModal').classList.remove('open'); }

        document.addEventListener('click', (e) => { if (e.target.id !== 'search') document.getElementById('results').style.display = "none"; });
        fetchVideoList();
    </script>
</body>
</html>
