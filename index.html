    <script>
        const API_URL = "get_videos.php";
        
        // 🌐 FIXED: Routing setup to look directly inside your remote GitHub storage repo branch
        const VIDEO_FOLDER = "https://raw.githubusercontent.com/demoreviewtv-png/FREEVID-Vidstorage/main/videos/";
        const THUMBNAIL_FOLDER = "https://raw.githubusercontent.com/demoreviewtv-png/FREEVID-Vidstorage/main/videos/thumbnails/";

        let serverVideos = [];
        let currentlyPlayingTitle = "";
        let cachedViews = {};

        async function fetchAllViews() {
            try {
                const response = await fetch(`${API_URL}?action=get_views`);
                cachedViews = await response.json();
            } catch (err) {
                console.error("Error fetching views from API:", err);
            }
        }

        function getVideoViews(filename) {
            return cachedViews[filename] || 0;
        }

        async function incrementVideoViews(filename, viewDisplayElement) {
            try {
                const response = await fetch(`${API_URL}?action=increment&file=${encodeURIComponent(filename)}`);
                const data = await response.json();
                cachedViews[filename] = data.views;
                
                if (viewDisplayElement) {
                    viewDisplayElement.textContent = `🔥 ${data.views.toLocaleString()} views`;
                }
            } catch (err) {
                console.error("Error saving view count:", err);
            }
        }

        function formatDuration(seconds) {
            if (isNaN(seconds) || seconds === Infinity || seconds <= 0) return "";
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            
            if (hrs > 0) {
                return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function getCleanName(filename) {
            return filename.replace(/\.[^/.]+$/, "")
                           .replace("[Downloadable]", "")
                           .replace("[AutoLoop]", "")
                           .replace(/\b\d{1,2}:\d{2}(?::\d{2})?\b/g, "")
                           .replace(/\[.*?\]/g, "")
                           .replace(/\s+/g, " ")
                           .trim();
        }

        function parseVideoMeta(filename) {
            const cleanName = getCleanName(filename);
            if (cleanName.includes(" - ")) {
                const parts = cleanName.split(" - ");
                return {
                    title: parts[0].trim(),
                    creator: parts[1].trim()
                };
            }
            return { title: cleanName, creator: "Unknown Creator" };
        }

        async function fetchVideoList() {
            const status = document.getElementById('status');
            const searchInput = document.getElementById('search');

            try {
                await fetchAllViews();

                const response = await fetch(API_URL);
                serverVideos = await response.json();

                if (serverVideos.length > 0) {
                    document.getElementById('status').textContent = `Successfully synced! (${serverVideos.length} videos found)`;
                    searchInput.disabled = false;
                    showRandomVideos();
                } else {
                    status.textContent = "Connected to server, but the storage repo folder is empty.";
                }
            } catch (err) {
                console.error("Error fetching library:", err);
                status.textContent = "Failed to load video list from server API.";
            }
        }

        function selectVideo(video) {
            const meta = parseVideoMeta(video);
            const videoSrc = VIDEO_FOLDER + encodeURIComponent(video);
            const dlBtn = document.getElementById('downloadBtn');
            const loopBtn = document.getElementById('loopBtn');
            const resetBtn = document.getElementById('resetBtn');
            const player = document.getElementById('player');
            const videoWrapper = document.getElementById('videoWrapper');
            const viewDisplay = document.getElementById('viewCountDisplay');

            viewDisplay.textContent = `🔥 ${(getVideoViews(video) + 1).toLocaleString()} views`;
            viewDisplay.style.display = "block";
            incrementVideoViews(video, viewDisplay);

            currentlyPlayingTitle = meta.title;
            player.src = videoSrc;
            
            videoWrapper.style.display = "flex";
            
            document.getElementById('search').value = meta.title;
            document.getElementById('status').textContent = "Now playing: " + meta.title;
            
            if (video.includes("[AutoLoop]")) {
                player.loop = true;
                loopBtn.classList.add('active');
                document.getElementById('loopText').textContent = "Looping: ON";
            } else {
                player.loop = false;
                loopBtn.classList.remove('active');
                document.getElementById('loopText').textContent = "Looping: OFF";
            }

            loopBtn.style.display = "inline-flex";

            if (video.includes("[Downloadable]")) {
                dlBtn.href = videoSrc;
                dlBtn.setAttribute("download", video);
                dlBtn.style.display = "inline-flex";
            } else {
                dlBtn.style.display = "none"; 
            }
            
            resetBtn.style.display = "inline-flex";

            if (meta.creator && meta.creator !== "Unknown Creator") {
                showCreatorGrid(meta.creator);
            } else {
                showRandomVideos(); 
            }
        }

        document.getElementById('player').addEventListener('loadedmetadata', function() {
            const trueDuration = formatDuration(this.duration);
            if (trueDuration && currentlyPlayingTitle) {
                const fullDisplay = `[${trueDuration}] ${currentlyPlayingTitle}`;
                document.getElementById('search').value = fullDisplay;
                document.getElementById('status').textContent = "Now playing: " + fullDisplay;
            }
        });

        function toggleLoop() {
            const player = document.getElementById('player');
            const loopBtn = document.getElementById('loopBtn');
            const loopText = document.getElementById('loopText');

            if (player.src) {
                player.loop = !player.loop;
                if (player.loop) {
                    loopBtn.classList.add('active');
                    loopText.textContent = "Looping: ON";
                } else {
                    loopBtn.classList.remove('active');
                    loopText.textContent = "Looping: OFF";
                }
            }
        }

        function showRandomVideos() {
            const header = document.getElementById('creatorHeader');
            header.textContent = "Discover Videos";
            
            const shuffled = [...serverVideos].sort(() => 0.5 - Math.random());
            const randomNine = shuffled.slice(0, 9);

            buildGridCards(randomNine);
        }

        function showCreatorGrid(creatorName) {
            const header = document.getElementById('creatorHeader');
            header.textContent = `More Videos From: ${creatorName}`;

            const matches = serverVideos.filter(video => {
                const meta = parseVideoMeta(video);
                return meta.creator && meta.creator.toLowerCase() === creatorName.toLowerCase();
            });

            buildGridCards(matches);
        }

        function buildGridCards(videoList) {
            const grid = document.getElementById('thumbnailGrid');
            grid.innerHTML = ""; 

            videoList.forEach(video => {
                const meta = parseVideoMeta(video);
                const videoSrc = VIDEO_FOLDER + encodeURIComponent(video);
                
                const baseName = video.replace(/\.[^/.]+$/, "");
                const customThumbnailSrc = `${THUMBNAIL_FOLDER}${encodeURIComponent(baseName)}.jpg`;
                const defaultThumbnailSrc = `${THUMBNAIL_FOLDER}DEFAULT-THUMBNAIL.png`;

                const card = document.createElement('div');
                card.className = "video-card";
                card.onclick = () => {
                    selectVideo(video);
                    window.scrollTo({ top: 0, behavior: 'smooth' }); 
                };

                const previewDiv = document.createElement('div');
                previewDiv.className = "thumb-preview";
                
                const thumbImage = document.createElement('img');
                thumbImage.src = customThumbnailSrc;
                thumbImage.alt = meta.title;

                thumbImage.onerror = function() {
                    if (this.src.endsWith('.jpg')) {
                        this.src = `${THUMBNAIL_FOLDER}${encodeURIComponent(baseName)}.png`;
                    } else if (this.src.endsWith('.png') && !this.src.includes('DEFAULT-THUMBNAIL')) {
                        this.src = defaultThumbnailSrc;
                    } else {
                        this.style.background = "#222";
                        this.onerror = null; 
                    }
                };

                previewDiv.appendChild(thumbImage);

                const hiddenMetaVideo = document.createElement('video');
                hiddenMetaVideo.src = videoSrc + "#t=0.1";
                hiddenMetaVideo.preload = "metadata";
                hiddenMetaVideo.muted = true;

                const detailsDiv = document.createElement('div');
                detailsDiv.className = "card-details";

                const titleDiv = document.createElement('div');
                titleDiv.className = "card-title";

                hiddenMetaVideo.addEventListener('loadedmetadata', function() {
                    const trueDuration = formatDuration(this.duration);
                    if (trueDuration) {
                        const durationSpan = document.createElement('span');
                        durationSpan.className = "title-duration";
                        durationSpan.textContent = trueDuration;
                        titleDiv.insertBefore(durationSpan, titleDiv.firstChild);
                    }
                });
                
                const titleTextSpan = document.createElement('span');
                titleTextSpan.textContent = meta.title;
                titleDiv.appendChild(titleTextSpan);

                const creatorDiv = document.createElement('div');
                creatorDiv.className = "card-creator";
                
                const creatorTextSpan = document.createElement('span');
                creatorTextSpan.textContent = meta.creator;
                
                const viewsSpan = document.createElement('span');
                viewsSpan.className = "card-views";
                viewsSpan.textContent = `${getVideoViews(video)} views`;

                creatorDiv.appendChild(creatorTextSpan);
                creatorDiv.appendChild(viewsSpan);

                detailsDiv.appendChild(titleDiv);
                detailsDiv.appendChild(creatorDiv);
                
                card.appendChild(previewDiv);
                card.appendChild(detailsDiv);
                grid.appendChild(card);
            });
        }

        function filterVideos() {
            const query = document.getElementById('search').value.toLowerCase();
            const box = document.getElementById('results');
            box.innerHTML = "";

            if (!query) { box.style.display = "none"; return; }

            const matches = serverVideos.filter(video => {
                const cleanName = getCleanName(video).toLowerCase();
                return cleanName.includes(query) || video.toLowerCase().includes(query);
            });

            if (matches.length > 0) {
                box.style.display = "block";
                matches.forEach(video => {
                    const meta = parseVideoMeta(video);
                    const div = document.createElement('div');
                    
                    div.textContent = meta.creator !== "Unknown Creator" ? `${meta.title} (by ${meta.creator})` : meta.title;
                    div.onclick = () => {
                        selectVideo(video);
                        box.style.display = "none";
                    };
                    box.appendChild(div);
                });
            } else {
                box.style.display = "none";
            }
        }

        function resetPlayer() {
            const player = document.getElementById('player');
            const videoWrapper = document.getElementById('videoWrapper');
            
            player.removeAttribute('src'); 
            player.loop = false; 
            player.load(); 

            videoWrapper.style.display = "none";

            currentlyPlayingTitle = "";
            document.getElementById('search').value = "";
            document.getElementById('status').textContent = `Successfully synced! (${serverVideos.length} videos found)`;
            document.getElementById('viewCountDisplay').style.display = "none";

            document.getElementById('downloadBtn').style.display = "none";
            document.getElementById('loopBtn').style.display = "none";
            document.getElementById('resetBtn').style.display = "none";
            showRandomVideos(); 
        }

        function openAboutModal() {
            document.getElementById('aboutModal').classList.add('open');
        }
        function closeAboutModal(e) {
            if (e.target.id === 'aboutModal') {
                document.getElementById('aboutModal').classList.remove('open');
            }
        }

        document.addEventListener('click', (e) => {
            if (e.target.id !== 'search') document.getElementById('results').style.display = "none";
        });

        document.getElementById('search').addEventListener('click', () => {
            if(document.getElementById('search').value !== "") {
                filterVideos();
            }
        });

        // ⏱️ AUTO-REFRESH LOGIC: Runs every 60 seconds (1 minute)
        setInterval(async () => {
            const player = document.getElementById('player');
            
            if (!player.src || (player.paused && player.readyState !== 1 && player.readyState !== 2 && !player.seeking)) {
                try {
                    await fetchAllViews();
                    const response = await fetch(API_URL);
                    const updatedVideos = await response.json();
                    
                    if (updatedVideos.length > 0) {
                        serverVideos = updatedVideos;
                        document.getElementById('search').disabled = false;
                        
                        const headerText = document.getElementById('creatorHeader').textContent;
                        if (headerText.includes("More Videos From:")) {
                            const creatorName = headerText.replace("More Videos From: ", "").trim();
                            showCreatorGrid(creatorName);
                        } else {
                            showRandomVideos();
                        }
                    }
                } catch (err) {
                    console.error("Background sync failed:", err);
                }
            }
        }, 60000);

        fetchVideoList();
    </script>
</body>
</html>
